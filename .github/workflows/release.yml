# Nezha Lite 统一发布工作流
# 推送 v* 格式的 tag 时触发，自动编译 Agent（20 平台）和 Dashboard（4 平台）并上传 GitHub Release
#
# 用法：
#   git tag v1.0.0
#   git push origin v1.0.0
#
# Agent：20 个平台组合（linux/windows/freebsd/darwin × 多架构）
# Dashboard：4 个平台组合（linux/windows/darwin × amd64/arm64）
#
# 版本号说明：{{.Version}} 来自 git tag，与原版无关。
# 例如推 v1.0.0 → Agent 和 Dashboard 版本号均为 "1.0.0"

name: Build + Release

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  # ==================== Agent 编译 ====================
  build-agent:
    strategy:
      fail-fast: true
      matrix:
        goos: [linux, windows, darwin, freebsd]
        goarch: [amd64, arm64, 386]
        include:
          - goos: linux
            goarch: 386
          - goos: linux
            goarch: s390x
          - goos: linux
            goarch: riscv64
          - goos: linux
            goarch: arm
          - goos: linux
            goarch: mips
            gomips: softfloat
          - goos: linux
            goarch: mipsle
            gomips: softfloat
          - goos: linux
            goarch: loong64
          - goos: freebsd
            goarch: arm
        exclude:
          - goos: darwin
            goarch: 386

    name: Build Agent (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.26.1

      - name: Build Test
        if: github.event_name != 'push' || !contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate --snapshot
          workdir: agent

      - name: Build
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOMIPS: ${{ matrix.gomips }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate
          workdir: agent

      - name: Archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p agent-dist
          zip -jr agent-dist/nezha-agent_${GOOS}_${GOARCH}.zip agent/dist/*/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nezha-agent_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ./agent-dist/nezha-agent_${{ matrix.goos }}_${{ matrix.goarch }}.zip

  # ==================== Dashboard 编译 ====================
  build-dashboard:
    strategy:
      fail-fast: true
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: darwin
            goarch: arm64

    name: Build Dashboard (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ^1.26.1

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: admin-frontend/package-lock.json

      - name: Build admin-frontend (精简版管理端前端)
        # 使用本项目 admin-frontend/ 源码构建，已移除 cron/nat/terminal/server-transfer 等菜单
        run: |
          cd admin-frontend
          npm ci --no-audit --no-fund
          npm run build
          # 将构建产物复制到 embed 目录（先清空再复制，避免嵌套）
          rm -rf ../nezha/cmd/dashboard/admin-dist
          cp -r dist ../nezha/cmd/dashboard/admin-dist

      - name: Prepare other frontend dists
        # 下载其他前端资源（版本与 frontend-templates.yaml 保持一致）
        run: |
          cd nezha/cmd/dashboard
          # nezha-dash-v2
          curl -L -o user.zip https://github.com/hamster1963/nezha-dash-v2/releases/download/v2.1.2/dist.zip
          unzip -q user.zip && mv dist user-dist && rm user.zip
          # nazhua
          curl -L -o nazhua.zip https://github.com/hi2shark/nazhua/releases/download/v0.9.1/dist.zip
          unzip -q nazhua.zip && mv dist nazhua-dist && rm nazhua.zip
          # nezha-ascii
          curl -L -o ascii.zip https://github.com/hamster1963/nezha-ascii/releases/download/v1.1.0/dist.zip
          unzip -q ascii.zip && mv dist nezha-ascii-dist && rm ascii.zip

      - name: Build Test
        if: github.event_name != 'push' || !contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate --snapshot
          workdir: nezha

      - name: Build
        if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
        uses: goreleaser/goreleaser-action@v6
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        with:
          distribution: goreleaser
          version: "~> v2"
          args: build --single-target --clean --skip=validate
          workdir: nezha

      - name: Archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dashboard-dist
          zip -jr dashboard-dist/nezha-dashboard_${GOOS}_${GOARCH}.zip nezha/dist/*/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nezha-dashboard_${{ matrix.goos }}_${{ matrix.goarch }}
          path: ./dashboard-dist/nezha-dashboard_${{ matrix.goos }}_${{ matrix.goarch }}.zip

  # ==================== 发布 Release ====================
  release:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    needs: [build-agent, build-dashboard]
    name: Release
    # 创建 GitHub Release 需要 contents:write 权限
    permissions:
      contents: write
    steps:
      - name: Download Agent artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nezha-agent_*
          merge-multiple: true
          path: ./assets

      - name: Download Dashboard artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: nezha-dashboard_*
          merge-multiple: true
          path: ./assets

      - name: Checksum
        run: sha256sum ./assets/*.zip | awk -F" |/" '{print $1, $NF}' > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            checksums.txt
            assets/*.zip
          generate_release_notes: true
