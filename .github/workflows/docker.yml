# Nezha Lite Docker 镜像发布工作流
# 推送 v* 格式的 tag 时触发，自动构建 Dashboard Docker 镜像并推送到 GHCR
#
# 用法：
#   git tag v1.0.0
#   git push origin v1.0.0
#
# 镜像地址：ghcr.io/<owner>/nezha-lite:latest 和 ghcr.io/<owner>/nezha-lite:<tag>
#
# GHCR 优势：
#   - 使用 GitHub 内置 GITHUB_TOKEN 认证，无需配置 DockerHub Secret
#   - 镜像权限与仓库权限一致，仓库协作者自动有镜像访问权
#   - 首次推送后需在 GitHub → Packages 页面将镜像设为 public（默认继承仓库可见性）

name: Docker Build + Push (GHCR)

on:
  push:
    tags:
      - "v*"

env:
  # 镜像名（小写，GHCR 要求）
  IMAGE_NAME: nezha-lite

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    # 需要二进制编译完成后再构建 Docker（复用编译产物）
    # 但 Dockerfile 是多阶段构建（内含 Go 编译），所以可以独立运行
    permissions:
      contents: read
      packages: write  # 推送 GHCR 需要 packages:write 权限

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        # 安装 QEMU 用于多架构构建（amd64 + arm64）

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # 启用 Buildx 多架构构建支持

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          # 自动生成标签：
          #   type=ref,event=tag     → v1.0.0
          #   type=semver,pattern={{version}}  → 1.0.0
          #   type=semver,pattern={{major}}.{{minor}}  → 1.0
          #   type=raw,value=latest  → latest
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          # GITHUB_TOKEN 由 GitHub Actions 自动注入，无需配置 Secret
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          # Dockerfile 位于 nezha/ 子目录，构建上下文为仓库根目录
          file: ./nezha/Dockerfile
          # 多架构支持：linux/amd64 + linux/arm64
          platforms: linux/amd64,linux/arm64
          # 推送到 GHCR
          push: true
          # 从 metadata 步骤自动生成标签
          tags: ${{ steps.meta.outputs.tags }}
          # 从 metadata 步骤自动生成 labels
          labels: ${{ steps.meta.outputs.labels }}
          # 构建参数：注入版本号（从 git tag 提取，去掉 v 前缀）
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          # GitHub Actions 缓存加速后续构建
          cache-from: type=gha
          cache-to: type=gha,mode=max