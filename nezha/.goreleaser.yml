# Nezha Lite Dashboard GoReleaser 配置
# 与原版区别：使用 modernc.org/sqlite（纯 Go），CGO_ENABLED=0，无需交叉编译工具链
version: 2
before:
  hooks:
    - go mod tidy -v
builds:
  - id: universal
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/nezhahq/nezha/service/singleton.Version={{.Version}}
    flags:
      - -trimpath
    tags:
      - modernc
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
      - goos: darwin
        goarch: amd64
    main: ./cmd/dashboard
    binary: nezha-dashboard
snapshot:
  version_template: "nezha-dashboard"
